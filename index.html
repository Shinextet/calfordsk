<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pink Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            user-select: none; /* စာသားတွေ highlight မဖြစ်အောင် ပိတ်ထားတာပါ */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffeef3;
            overflow: hidden; /* Scroll bar တွေ မပေါ်အောင်ပါ */
        }

        .calculator {
            /* Fix Size သတ်မှတ်ချက် */
            width: 340px;
            height: 540px; 
            background-color: #fffafb;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(255, 180, 200, 0.3);
            
            /* Border ကို ဖြုတ်လိုက်ပါတယ် */
            border: none; 
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .display-container {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 10px;
            padding: 0 10px;
        }

        .display {
            width: 100%;
            text-align: right;
            font-size: 3rem;
            font-weight: 300;
            color: #4a4a4a;
            border: none;
            background: transparent;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 5px;
        }

        button {
            height: 62px;
            border-radius: 18px;
            /* ခလုတ်တွေရဲ့ Border ကိုလည်း ပိုပါးအောင် သို့မဟုတ် ဖြုတ်ထားနိုင်ပါတယ် */
            border: none; 
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            background-color: #ffffff;
            color: #4a4a4a;
            box-shadow: 0 4px 10px rgba(255, 180, 200, 0.1);
        }

        button:hover {
            background: #fff0f3;
        }

        button.active {
            transform: scale(0.95);
            background: #ffe5ec !important;
        }

        .operator {
            background-color: #fff0f3;
            color: #ff6090;
        }

        .clear {
            color: #ff4d6d;
        }

        .equal {
            background: #ff99b3;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 153, 179, 0.4);
        }

        .equal:hover {
            background-color: #ff85a3;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <input type="text" class="display" id="result" value="0" readonly>
    </div>
    
    <div class="buttons">
        <button class="operator clear" id="key-Delete" onclick="clearDisplay()">C</button>
        <button class="operator" id="key-/" onclick="appendValue('/')">÷</button>
        <button class="operator" id="key-*" onclick="appendValue('*')">×</button>
        <button class="operator" id="key-Backspace" onclick="deleteLast()">⌫</button>
        
        <button id="key-7" onclick="appendValue('7')">7</button>
        <button id="key-8" onclick="appendValue('8')">8</button>
        <button id="key-9" onclick="appendValue('9')">9</button>
        <button class="operator" id="key--" onclick="appendValue('-')">−</button>
        
        <button id="key-4" onclick="appendValue('4')">4</button>
        <button id="key-5" onclick="appendValue('5')">5</button>
        <button id="key-6" onclick="appendValue('6')">6</button>
        <button class="operator" id="key-+" onclick="appendValue('+')">+</button>
        
        <button id="key-1" onclick="appendValue('1')">1</button>
        <button id="key-2" onclick="appendValue('2')">2</button>
        <button id="key-3" onclick="appendValue('3')">3</button>
        <button class="operator" id="key-%" onclick="appendValue('%')">%</button>
        
        <button class="zero" id="key-0" onclick="appendValue('0')">0</button>
        <button id="key-." onclick="appendValue('.')">.</button>
        <button class="equal" id="key-Enter" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('result');

    function updateFontSize() {
        const len = display.value.length;
        if (len <= 8) display.style.fontSize = "3rem";
        else if (len <= 12) display.style.fontSize = "2.2rem";
        else display.style.fontSize = "1.5rem";
    }

    function appendValue(value) {
        if (display.value === '0' && value !== '.') {
            display.value = value;
        } else {
            if (value === '.' && display.value.includes('.')) return;
            display.value += value;
        }
        updateFontSize();
    }

    function clearDisplay() {
        display.value = '0';
        updateFontSize();
    }

    function deleteLast() {
        display.value = display.value.length > 1 ? display.value.slice(0, -1) : '0';
        updateFontSize();
    }

    function calculate() {
        try {
            let expression = display.value.replace(/×/g, '*').replace(/÷/g, '/');
            if (expression.includes('%')) {
                expression = expression.replace(/(\d+)%/g, "($1/100)");
            }
            let result = eval(expression);
            display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(4));
            updateFontSize();
        } catch (e) {
            display.value = "Error";
            setTimeout(clearDisplay, 1000);
        }
    }

    document.addEventListener('keydown', (e) => {
        let key = e.key;
        let targetId = "";
        if (key === 'Enter' || key === '=') targetId = "key-Enter";
        else if (key === 'Backspace') targetId = "key-Backspace";
        else if (key === 'Delete' || key === 'Escape') targetId = "key-Delete";
        else if (['+', '-', '*', '/', '%', '.'].includes(key)) targetId = "key-" + key;
        else if (!isNaN(key)) targetId = "key-" + key;

        const btn = document.getElementById(targetId);
        if (btn) {
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 100);
            btn.click();
        }
    });
</script>

</body>
</html>
