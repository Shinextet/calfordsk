<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pink Calculator - Final Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffeef3;
        }

        .calculator {
            width: 340px;
            background-color: #fffafb;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(255, 180, 200, 0.3);
            border: 1px solid #ffe5ec;
            overflow: hidden;
        }

        .display-container {
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
            padding: 0 15px;
            overflow: hidden;
        }

        .display {
            width: 100%;
            text-align: right;
            font-size: 3rem;
            font-weight: 300;
            color: #4a4a4a;
            border: none;
            background: transparent;
            outline: none;
            transition: font-size 0.2s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            height: 65px;
            border-radius: 20px;
            border: 1.5px solid #ffdae3; 
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            background-color: #ffffff;
            color: #4a4a4a;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hover and Active states for standard buttons */
        button:not(.equal):hover {
            border-color: #ffb3c1;
            background: #fff8f9;
        }

        button.active {
            transform: scale(0.9);
            background: #ffe5ec !important;
            border-color: #ff8fab !important;
        }

        .operator {
            background-color: #fff0f3;
            color: #ff6090;
        }

        .clear {
            color: #ff4d6d;
        }

        /* Special Equal Button Identity */
        .equal {
            background: #ff99b3;
            color: white;
            border: 1px solid #ff99b3;
        }

        .equal:hover {
            background-color: #ff85a3;
        }

        .equal.active {
            background-color: #ff7090 !important;
        }

        /* 0 ခလုတ်ကို ၂ ကွက်စာ ချဲ့ထားမယ် */
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <input type="text" class="display" id="result" value="0" readonly>
    </div>
    
    <div class="buttons">
        <button class="operator clear" id="key-Delete" onclick="clearDisplay()">C</button>
        <button class="operator" id="key-/" onclick="appendValue('/')">÷</button>
        <button class="operator" id="key-*" onclick="appendValue('*')">×</button>
        <button class="operator" id="key-Backspace" onclick="deleteLast()">⌫</button>
        
        <button id="key-7" onclick="appendValue('7')">7</button>
        <button id="key-8" onclick="appendValue('8')">8</button>
        <button id="key-9" onclick="appendValue('9')">9</button>
        <button class="operator" id="key--" onclick="appendValue('-')">−</button>
        
        <button id="key-4" onclick="appendValue('4')">4</button>
        <button id="key-5" onclick="appendValue('5')">5</button>
        <button id="key-6" onclick="appendValue('6')">6</button>
        <button class="operator" id="key-+" onclick="appendValue('+')">+</button>
        
        <button id="key-1" onclick="appendValue('1')">1</button>
        <button id="key-2" onclick="appendValue('2')">2</button>
        <button id="key-3" onclick="appendValue('3')">3</button>
        <button class="operator" id="key-%" onclick="appendValue('%')">%</button>
        
        <button class="zero" id="key-0" onclick="appendValue('0')">0</button>
        <button id="key-." onclick="appendValue('.')">.</button>
        <button class="equal" id="key-Enter" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('result');

    function updateFontSize() {
        const len = display.value.length;
        if (len <= 8) {
            display.style.fontSize = "3rem";
        } else if (len > 8 && len <= 12) {
            display.style.fontSize = "2.2rem";
        } else if (len > 12 && len <= 18) {
            display.style.fontSize = "1.6rem";
        } else {
            display.style.fontSize = "1.2rem";
        }
    }

    function appendValue(value) {
        if (display.value === '0' && value !== '.') {
            display.value = value;
        } else {
            // ဒသမအချက် နှစ်ခါမဖြစ်အောင် စစ်ဆေးခြင်း
            if (value === '.' && display.value.includes('.')) {
                // လက်ရှိရိုက်နေတဲ့ ဂဏန်းအပိုင်းမှာ ဒသမ ရှိမရှိ စစ်ဆေးဖို့ Logic ထပ်ထည့်နိုင်ပါတယ်
            }
            display.value += value;
        }
        updateFontSize();
    }

    function clearDisplay() {
        display.value = '0';
        updateFontSize();
    }

    function deleteLast() {
        if (display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = '0';
        }
        updateFontSize();
    }

    function calculate() {
        if (display.value === "" || display.value === "0") return;
        try {
            let expression = display.value.replace(/×/g, '*').replace(/÷/g, '/');
            // Percentage logic handling
            if (expression.includes('%')) {
                expression = expression.replace(/(\d+)%/g, "($1/100)");
            }
            let result = eval(expression);
            display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(4));
            updateFontSize();
        } catch (e) {
            display.value = "Error";
            setTimeout(clearDisplay, 1000);
        }
    }

    document.addEventListener('keydown', (e) => {
        let key = e.key;
        if (key === 'Enter') e.preventDefault();

        let targetId = "";
        if (key === 'Backspace') targetId = "key-Backspace";
        else if (key === 'Delete' || key === 'Escape') targetId = "key-Delete";
        else if (key === 'Enter' || key === '=') targetId = "key-Enter";
        else if (key === '*') targetId = "key-*";
        else if (key === '/') targetId = "key-/";
        else if (key === '%') targetId = "key-%";
        else if (key === '.') targetId = "key-.";
        else targetId = "key-" + key;

        const btn = document.getElementById(targetId);
        if (btn) {
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 100);
            btn.click();
        }
    });
</script>

</body>
</html>
