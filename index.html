<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Fast Calculator</title>
    <link rel="icon" href="[https://cdn-icons-png.flaticon.com/512/2344/2344132.png](https://cdn-icons-png.flaticon.com/512/2344/2344132.png)">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #fffafb; }

        .calculator-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            padding: 3vh 3vw;
        }

        .display-container {
            flex: 1.2; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: flex-end;
            padding: 2vh; margin-bottom: 2vh;
        }

        .display {
            width: 100%; border: none; background: transparent;
            outline: none; text-align: right;
            font-size: 6rem; /* Default size */
            color: #4a4a4a; font-weight: 700;
            transition: font-size 0.15s ease;
        }

        .buttons-grid {
            flex: 4; display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1.8vh;
        }

        button {
            width: 100%; height: 100%; background: #fff;
            color: #4a4a4a; border: 2px solid #ffdae3; 
            border-radius: 2.5vh; font-size: clamp(1.2rem, 3.5vh, 2.2rem);
            font-weight: bold; cursor: pointer;
            transition: transform 0.05s; display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(255, 180, 200, 0.1);
            user-select: none;
        }

        button:active { transform: scale(0.92); background: #ffe5ec !important; }
        .operator { background: #fff0f3; color: #ff6090; border-color: #ffe5ec; }
        .clear { color: #ff4d6d; }
        .equal { background: #ff99b3; color: white; border: none; }
        .zero { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator-container">
    <div class="display-container">
        <input type="text" class="display" id="result" value="0" readonly>
    </div>
    
    <div class="buttons-grid">
        <button class="operator clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('÷')">÷</button>
        <button class="operator" onclick="appendValue('×')">×</button>
        <button class="operator" onclick="deleteLast()">⌫</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('%')">%</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('result');

    function formatNumber(numStr) {
        let plainNumber = numStr.toString().replace(/,/g, '');
        if (isNaN(plainNumber) || plainNumber === "") return numStr;
        let parts = plainNumber.split(".");
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join(".");
    }

    function updateFontSize() {
        const len = display.value.length;
        if (len <= 7) display.style.fontSize = "6rem";
        else if (len <= 10) display.style.fontSize = "4.5rem";
        else if (len <= 15) display.style.fontSize = "3rem";
        else display.style.fontSize = "2.2rem";
    }

    function appendValue(value) {
        let current = display.value.replace(/,/g, '');
        const ops = ['+', '-', '×', '÷', '%'];

        if (current === '0' && !ops.includes(value) && value !== '.') {
            display.value = value;
        } else {
            if (ops.includes(value) && ops.includes(current.slice(-1))) return;
            if (value === '.' && current.includes('.')) return;
            display.value = formatNumber(current + value);
        }
        updateFontSize();
    }

    function clearDisplay() { display.value = '0'; updateFontSize(); }

    function deleteLast() {
        let current = display.value.replace(/,/g, '');
        display.value = current.length > 1 ? formatNumber(current.slice(0, -1)) : '0';
        updateFontSize();
    }

    function calculate() {
        try {
            let expr = display.value.replace(/,/g, '').replace(/×/g, '*').replace(/÷/g, '/');
            if (expr.includes('%')) expr = expr.replace(/(\d+)%/g, "($1/100)");
            let result = eval(expr);
            display.value = formatNumber(Number.isInteger(result) ? result : parseFloat(result.toFixed(8)));
            updateFontSize();
        } catch {
            display.value = "Error";
            setTimeout(clearDisplay, 1000);
        }
    }

    // Keyboard support - ပိုမြန်အောင် ပြင်ဆင်ထားပါတယ်
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'Enter' || key === '=') calculate();
        else if (key === 'Backspace') deleteLast();
        else if (key === 'Delete' || key === 'Escape') clearDisplay(); // Delete နှိပ်ရင် အကုန်ပျက်မယ်
        else if (!isNaN(key) || ['+', '-', '*', '/', '.', '%'].includes(key)) {
            appendValue(key.replace('*', '×').replace('/', '÷'));
        }
    });

    // Speed Optimization: App ကို အမြန်ပွင့်စေမည့် Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
</script>

</body>
</html>
